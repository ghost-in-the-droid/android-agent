name: tiktok
description: TikTok automation skill — open, search, navigate, upload your own drafts
version: "1.0.0"
app_package: com.zhiliaoapp.musically
android_package: com.zhiliaoapp.musically
platforms:
  - android
app_version_tested: "44.3.3"
exports:
  actions:
    - open_app
    - navigate_to_profile
    - tap_search
    - type_and_search
    - dismiss_popup
  workflows:
    - upload_video
    - publish_draft

# Default parameters — pre-filled in the UI run modal
popup_detectors:
  - detect: "Continue editing"
    button: "Save draft"
    label: "Draft resume overlay"
  - detect: "connect with people"
    button: "Don’t allow"
    label: "Contacts access popup"
  - detect: "access to your Facebook"
    button: "Don't allow"
    label: "Facebook friends access popup"
  - detect: "Make TikTok Shop more relevant"
    button: "Select"
    label: "TikTok Shop relevance"
  - detect: "shared collections"
    button: "Not now"
    label: "Shared collections popup"
  - detect: "Turn on notifications"
    button: "Not now"
    label: "Notifications popup"
  - detect: "security checkup"
    button: "Close"
    label: "Security checkup popup"
  - detect: 'content-desc="Close"'
    button: "Close"
    label: "Close dialog"
  - detect: "Skip"
    button: "Skip"
    label: "Skip dialog"
  - detect: "Learn more"
    button: "_back"
    label: "Invisible promo overlay"
    method: "back"

default_params:
  actions:
    type_and_search:
      query: "#cats"
  workflows:
    upload_video:
      video_path: "/sdcard/DCIM/video.mp4"
      caption: "Check this out!"
      hashtags: "#fyp #viral"
      as_draft: false
    publish_draft:
      draft_tag: ""
