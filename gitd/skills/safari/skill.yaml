name: safari
description: Configurable iOS Chrome/browser smoke automation
version: "0.1.0"
app_package: ""
ios_bundle_id: com.google.chrome.ios
platforms:
  - ios

exports:
  actions:
    - open_browser
    - open_safari
    - open_url
    - verify_page
    - read_news
  workflows:
    - open_ghost_site
    - read_news

default_params:
  actions:
    open_browser:
      bundle_id: "com.google.chrome.ios"
    open_url:
      url: "https://ghostinthedroid.com"
    verify_page:
      expected: "ghostinthedroid"
    read_news:
      url: "https://text.npr.org/"
      max_headlines: 5
      max_articles: 3
      bundle_id: "com.google.chrome.ios"
  workflows:
    open_ghost_site:
      url: "https://ghostinthedroid.com"
      bundle_id: "com.google.chrome.ios"
    read_news:
      url: "https://text.npr.org/"
      max_headlines: 5
      max_articles: 3
      bundle_id: "com.google.chrome.ios"
      save_screenshots: true
      out_dir: "data/ios_chrome_news_smoke"
