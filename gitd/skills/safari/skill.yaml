name: safari
description: Configurable iOS Chrome/browser smoke automation
version: "0.1.0"
app_package: ""
ios_bundle_id: com.google.chrome.ios
platforms:
  - ios

exports:
  actions:
    - open_browser
    - open_safari
    - open_url
    - verify_page
  workflows:
    - open_ghost_site

default_params:
  actions:
    open_browser:
      bundle_id: "com.google.chrome.ios"
    open_url:
      url: "https://ghostinthedroid.com"
    verify_page:
      expected: "ghostinthedroid"
  workflows:
    open_ghost_site:
      url: "https://ghostinthedroid.com"
      bundle_id: "com.google.chrome.ios"
