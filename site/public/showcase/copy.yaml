  sizzle_order: 10
  hook: Your inference stack. Your rules.
  caption: 'Your inference stack. Your rules.


    Ghost v1.3.0 ships six LLM providers. vLLM for self-hosted GPU

    clusters — high throughput, OpenAI-compatible endpoint, point Ghost

