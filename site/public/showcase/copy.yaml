- id: run-flow
  title: Run a Flow
  featured: true
  status: live
  sizzle_order: 3
  hook: One command. 15 steps. Done while you slept.
  caption: 'You built the flow. The ghost runs it.


    Ghost''s agentic loop chains MCP tools into reusable workflows —

    multi-step tasks that combine screenshots, taps, swipes, and OCR

    into a single callable routine. Run it once. Schedule it. Fire it

    from your own LLM agent.


    No root. No companion app. No modification to the target app.

    Just ADB and a ghost that never forgets a step.


    Skill system · 40+ MCP tools · MIT · $0/device

    '
