    url: https://ghostinthedroid.com/docs/getting-started/ios
  - label: GitHub
    url: https://github.com/ghost-in-the-droid/android-agent
- id: on-device-gemma
  title: On-Device Gemma
  featured: true
  status: live
  sizzle_order: 1
  hook: The phone is the body. Now it's also the brain.
  caption: 'The phone is the body. Now it''s also the brain.


    Ghost v1.3.0 runs Gemma directly inside the Ghost APK.

    MediaPipe for 1B/2B models. llama.cpp via JNI for anything GGUF —

    Gemma 4, Llama, Mistral, DeepSeek. The model executes in the

    phone''s own process. Nothing leaves the device. Works in airplane

    mode. $0 inference cost, forever.


    One phone. Zero cloud. Zero API key.


    40+ MCP tools · MIT · pip install ghost-in-the-droid

