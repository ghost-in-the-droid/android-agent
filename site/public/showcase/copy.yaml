- id: mcp-claude-code
  title: Claude Code → Your Phone
  featured: true
  status: live
  sizzle_order: 2
  hook: 40+ tools. One command. Your phone just became Claude's hands.
  caption: 'Your LLM agent can think. Now it can touch.


    Add Ghost to any MCP client — Claude Code, Cursor, Windsurf — with

    one pip install. 40+ tools unlock instantly: screenshot, tap, swipe,

    type, read the screen, install apps, run automation skills.


    Tell Claude to order coffee on Starbucks. Watch it happen on your phone.


    Direct ADB connection. No cloud relay. No middleman.


    40+ MCP tools · MIT · pip install ghost-in-the-droid

    '
