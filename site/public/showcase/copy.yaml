- id: ghost-gemma-model
  title: Ghost-Gemma Model
  featured: false
  status: live
  sizzle_order: 12
  hook: We trained Gemma to use a phone. On-device tool use, for real.
  caption: 'We trained Gemma to use a phone. On-device tool use, for real.


    Ghost-Gemma is a Gemma fine-tune trained on Ghost tool-call trajectories —

    screenshots, accessibility trees, tap sequences, and the decisions that

    connected them. It knows what app states look like, what buttons mean,

    and how to navigate real-world Android UIs without being told twice.


    An early-stage on-device model, still evolving. The goal: a capable

    phone agent that runs entirely in your pocket, no cloud required.


    Plug it into Ghost''s harness and go. The harness handles the rest.


    Ghost Bench · on-device inference · MIT · pip install ghost-in-the-droid

    '
  ctas:
