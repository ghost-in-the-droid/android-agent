- id: iphone-duolingo
  title: iPhone Duolingo
  featured: true
  status: live
  sizzle_order: 9
  hook: Ghost does the lesson. The streak lives.
  caption: 'Ghost does the lesson. The streak lives.


    14 exercises. First try. No cheating.


    Ghost drives Duolingo on a real iPhone — reads each question via the
    accessibility tree, taps the right answer, types Chinese when prompted,
    and submits. All through Ghost''s MCP tools over WebDriverAgent.
    No jailbreak. No Duolingo API. Just the screen and an agent that reads.


    Streak 623 → 625. Preserved.


    iOS support · 40+ MCP tools · MIT · pip install ghost-in-the-droid

    '
  ctas:
