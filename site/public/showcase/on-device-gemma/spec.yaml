# Showcase demo spec — on-device inference, airplane mode, phone-only layout.
# Model in recording: Qwen3-4B-instruct (see NOTE below on demo ID vs model).
# NOTE: demo ID stays 'on-device-gemma' (product supports Gemma/Qwen/Llama/Mistral);
# the HUD shows Qwen3-4B. Copy updated to reflect any GGUF model, not Gemma-specific.
# CKL to confirm title stays 'On-Device Gemma' or broadens to 'On-Device AI'.
placeholder: false
demo: on-device-gemma
title: "On-Device AI"
category: llm-providers
featured: true
docs: /features/on-device-llm/
duration_target_s: 45
device: android
layout: phone_only

platform_notes: "Qwen3-4B-instruct running in the Ghost APK via llama.cpp JNI. Airplane mode on camera throughout."

setup:
  - step: airplane_mode_on
  - step: wake_unlock
  - step: kill_all_apps
  - step: shell
    args: { cmd: "input keyevent KEYCODE_HOME" }

timeline:
  - t: 0
    caption: "Airplane mode. No cloud. No API key."
    action: show_phone
    notes: "HUD visible — model name + airplane icon prominent"

  - t: 4
    caption: "Qwen3-4B. Running inside the Ghost APK."
    action: show_phone
    notes: "model HUD animates in or is already visible"

  - t: 8
    caption: "Open Reddit. Summarize the top posts."
    action: show_phone
    notes: "agent receives the task, Reddit opens"

  - t: 16
    caption: "It reads the screen. Reasons about it. On the phone."
    action: show_phone
    notes: "Reddit posts visible, model processing"

  - t: 28
    caption: "Nothing left the device."
    action: show_phone
    notes: "summary appears on screen"

  - t: 38
    caption: "One phone. Zero cloud. Zero cost."
    action: show_phone

outro:
  cta_line: "pip install ghost-in-the-droid"
  cta_link: "https://ghostinthedroid.com/docs/getting-started/installation"

highlight_window: { start_s: 28, end_s: 38 }
