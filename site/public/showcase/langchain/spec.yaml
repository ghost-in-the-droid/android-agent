demo: langchain
device: android
duration_target_s: 300

# 3-window layout: phone (left) + code (top-right, langchain_script.py fully
# visible ≤50 lines) + terminal (bottom-right, ReAct trace + DB writes)
layout: three_window
code_pane_source: scripts/showcase/langchain_script.py

setup:
  - step: wake_unlock
  - step: kill_all_apps
  - step: shell
    args: {cmd: "input keyevent KEYCODE_HOME"}
  - step: shell
    args: {cmd: "input keyevent KEYCODE_HOME"}
  - step: shell
    args: {cmd: "rm -f scripts/showcase/posts.db"}

# 3 accounts (karpathy/ylecun/sama). Each terminal_type BLOCKS until the harvest
# finishes (subprocess.run), so runs are sequential + self-pacing; t-values are
# lower bounds spaced by a realistic Sonnet-5 harvest (~90s) so content_s (which
# also caps the phone recording) never cuts a run mid-harvest. Captions are not
# rendered in the three_window motion layout (headline baked into bg-langchain).
timeline:
  - t: 0
    caption: "A LangChain ReAct agent with a real phone body."
    action: terminal_type
    args:
      cmd: "cat scripts/showcase/langchain_script.py"

  - t: 8
    caption: "Agent opens a subreddit, reads the top posts."
    action: terminal_type
    args:
      cmd: "/home/ckl/.ghost-cc-venv/bin/python scripts/showcase/langchain_script.py"

  - t: 140
    caption: "Next subreddit."
    action: terminal_type
    args:
      cmd: "/home/ckl/.ghost-cc-venv/bin/python scripts/showcase/langchain_script.py"

  - t: 280
    caption: "2 subreddits profiled. Ghost drove. LangChain thought."
    action: terminal_type
    args:
      cmd: "/home/ckl/.ghost-cc-venv/bin/python scripts/showcase/langchain_script.py --stats"

outro:
  cta_line: "pip install ghost-in-the-droid[langchain]"
  cta_link: "https://ghostinthedroid.com/features/integrations/"

highlight_window: {start_s: 284, end_s: 292}
