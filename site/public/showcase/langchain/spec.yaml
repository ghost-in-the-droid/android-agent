demo: langchain
device: android
duration_target_s: 90

# 3-window layout: phone (left) + code (top-right, langchain_script.py fully
# visible ≤50 lines) + terminal (bottom-right, ReAct trace + DB writes)
layout: three_window
code_pane_source: scripts/showcase/langchain_script.py

setup:
  - step: wake_unlock
  - step: kill_all_apps
  - step: shell
    args: {cmd: "input keyevent KEYCODE_HOME"}
  - step: shell
    args: {cmd: "input keyevent KEYCODE_HOME"}
  - step: shell
    args: {cmd: "rm -f scripts/showcase/users.db"}

timeline:
  - t: 0
    caption: "A LangChain ReAct agent with a real phone body."
    action: terminal_type
    args:
      cmd: "cat scripts/showcase/langchain_script.py"

  - t: 6
    caption: "5 X accounts to profile. Agent picks one per run."
    action: terminal_type
    args:
      cmd: "python3 scripts/showcase/langchain_script.py"

  - t: 22
    caption: "Run again → next account."
    action: terminal_type
    args:
      cmd: "python3 scripts/showcase/langchain_script.py"

  - t: 38
    caption: "And again."
    action: terminal_type
    args:
      cmd: "python3 scripts/showcase/langchain_script.py"

  - t: 54
    caption: "And again."
    action: terminal_type
    args:
      cmd: "python3 scripts/showcase/langchain_script.py"

  - t: 70
    caption: "Last one."
    action: terminal_type
    args:
      cmd: "python3 scripts/showcase/langchain_script.py"

  - t: 82
    caption: "5 accounts profiled. Ghost drove. LangChain thought."
    action: terminal_type
    args:
      cmd: "python3 scripts/showcase/langchain_script.py --stats"

outro:
  cta_line: "pip install ghost-in-the-droid[langchain]"
  cta_link: "https://ghostinthedroid.com/features/integrations/"

highlight_window: {start_s: 82, end_s: 90}
