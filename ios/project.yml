name: GhostLLM
options:
  bundleIdPrefix: com.ghostinthedroid
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
packages:
  LlamaSwift:
    url: https://github.com/mattt/llama.swift
    branch: main
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  GhostLLM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GhostLLM
    dependencies:
      - package: LlamaSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostinthedroid.ghostllm
        CODE_SIGN_STYLE: Automatic
        # DEVELOPMENT_TEAM is passed on the xcodebuild command line (kept out of
        # git) — see ios/README.md. Local override: IOS_XCODE_ORG_ID.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Ghost publishes this device's on-device demo status to the fleet dashboard."
        INFOPLIST_KEY_CFBundleDisplayName: Ghost LLM
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # llama.h is a C header (extern "C") — plain C interop is enough.
